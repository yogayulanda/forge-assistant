<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">

      <div class="label">Header card</div>
    </div>
    <div style="flex:1;padding:18px;border-radius:16px;background:#18181b;border:1px solid rgb(255 255 255 / 0.10)">
      <div style="font-weight:600;color:#f4f4f5;margin-bottom:4px">no shadow</div>
